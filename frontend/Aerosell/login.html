<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AeroSell — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="index.html">AeroSell</a>
      </div>
    </nav>
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h2 class="mb-3">Sign in</h2>
              <form id="loginForm">
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input id="email" name="email" type="email" class="form-control" required />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input id="password" name="password" type="password" class="form-control" required />
                </div>
                <div class="d-flex align-items-center">
                  <button class="btn btn-primary" type="submit">Sign in</button>
                  <a href="register.html" class="ms-3">Create account</a>
                </div>
                <p class="note mt-3 text-danger" id="msg"></p>
              </form>
            </div>
          </div>
          <div class="text-center mt-4">
            <a href="index.html" class="text-muted text-decoration-none small">← Back to Home</a>
          </div>
        </div>
      </div>
    </main>

    <script>
      const form = document.getElementById('loginForm')
      const msg = document.getElementById('msg')
      form.addEventListener('submit', async (e) => {
        e.preventDefault()
        msg.textContent = ''
        const email = form.email.value
        const password = form.password.value
        try{
          const res = await fetch('/api/validate', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({email,password})
          })
          if(res.ok){
            const data = await res.json()
            msg.classList.remove('text-danger')
            msg.classList.add('text-success')
            msg.textContent = 'Login successful'
            console.log(data)
          } else if(res.status===401){
            msg.classList.remove('text-success')
            msg.classList.add('text-danger')
            msg.textContent = 'Invalid credentials'
          } else {
            msg.classList.remove('text-success')
            msg.classList.add('text-danger')
            msg.textContent = 'Login failed'
          }
        }catch(err){
          msg.classList.remove('text-success')
          msg.classList.add('text-danger')
          msg.textContent = 'Network error'
        }
      })
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
