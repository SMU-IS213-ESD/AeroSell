<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AeroSell — Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="index.html">AeroSell</a>
      </div>
    </nav>
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h2 class="mb-3">Create account</h2>
              <form id="registerForm">
                <div class="mb-3">
                  <label for="name" class="form-label">Full name</label>
                  <input id="name" name="name" type="text" class="form-control" required />
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input id="email" name="email" type="email" class="form-control" required />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input id="password" name="password" type="password" class="form-control" required />
                </div>
                <div class="mb-3">
                  <label for="phone" class="form-label">Phone (optional)</label>
                  <input id="phone" name="phone" type="tel" class="form-control" />
                </div>
                <div class="d-flex align-items-center">
                  <button class="btn btn-primary" type="submit">Create account</button>
                  <a href="login.html" class="ms-3">Sign in</a>
                </div>
                <p class="note mt-3 text-success" id="msg"></p>
              </form>
            </div>
          </div>
          <div class="text-center mt-4">
            <a href="index.html" class="text-muted text-decoration-none small">← Back to Home</a>
          </div>
        </div>
      </div>
    </main>

    <script>
      const form = document.getElementById('registerForm')
      const msg = document.getElementById('msg')
      form.addEventListener('submit', async (e) => {
        e.preventDefault()
        msg.textContent = ''
        const payload = {
          name: form.name.value,
          email: form.email.value,
          password: form.password.value,
          phone: form.phone.value || undefined
        }
        try{
          const res = await fetch('/api/users', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify(payload)
          })
          const data = await res.json()
          if(res.ok){
            msg.classList.remove('text-danger')
            msg.classList.add('text-success')
            msg.textContent = data.message || 'Account created'
          } else {
            msg.classList.remove('text-success')
            msg.classList.add('text-danger')
            msg.textContent = data.error || 'Registration failed'
          }
        }catch(err){
          msg.classList.remove('text-success')
          msg.classList.add('text-danger')
          msg.textContent = 'Network error'
        }
      })
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
